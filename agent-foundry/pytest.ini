[pytest]
# importlib import mode lets the suite hold duplicate test-file basenames (e.g. several
# framework `test_run.py` files) without __init__.py packages — the prepend default cannot.
# Every test module primes its own sys.path, so this mode is transparent to them.
addopts = --import-mode=importlib
# Registers the markers used by the foundry test suites so `-m unit` selects the
# unverified-bug unit modules (§7.4) without an unknown-marker warning. Additive:
# unmarked tests (tests/*.py) are still collected by a plain `pytest tests/` run.
markers =
    unit: fast, pure-Python unit test (no model / no backend); selected by `pytest -m unit`.
    integration: exercises real files/subprocesses.
